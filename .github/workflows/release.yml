name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .deb
        run: packaging/build-deb.sh "$VERSION"

      - name: Zip windows scripts
        run: zip -j "branchify-windows.zip" windows/branchify.ps1 windows/install.ps1 windows/uninstall.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            branchify_${{ env.VERSION }}_all.deb
            branchify-windows.zip
            packaging/PKGBUILD
          generate_release_notes: true
